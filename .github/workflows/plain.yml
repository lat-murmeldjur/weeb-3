name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: "true"
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: cargo install wasm-pack --locked
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Build
        run: cargo build --verbose
      - name: Build npm package
        env:
          NPM_SCOPE: ${{ vars.NPM_SCOPE || github.repository_owner }}
        run: |
          set -euo pipefail
          SCOPE_ARGS=()
          if [ -n "${NPM_SCOPE:-}" ]; then
            SCOPE_ARGS=(--scope "$NPM_SCOPE")
          fi
          RUSTFLAGS='--cfg getrandom_backend="wasm_js"' wasm-pack build --target web --out-dir static --out-name weeb_3 "${SCOPE_ARGS[@]}"
          cd static
          npm pkg delete files || true
          npm pkg delete sideEffects || true
          npm pkg delete exports || true
          npm pkg delete keywords || true
          npm pkg delete publishConfig || true
          npm pkg set \
            name="@${NPM_SCOPE}/weeb_3" \
            description="A Swarm client for browsers" \
            main="./weeb_3.js" \
            module="./weeb_3.js" \
            types="./weeb_3.d.ts" \
            repository.type="git" \
            repository.url="git+https://github.com/lat-murmeldjur/weeb-3.git" \
            bugs.url="https://github.com/lat-murmeldjur/weeb-3/issues" \
            homepage="https://github.com/lat-murmeldjur/weeb-3#readme" \
            publishConfig.access="public" \
            publishConfig.registry="https://registry.npmjs.org/"
          npm pkg set \
            files[0]="snippets/web3-0742d85b024bb6f5/inline0.js" \
            files[1]="weeb_3.d.ts" \
            files[2]="weeb_3.js" \
            files[3]="weeb_3_bg.wasm" \
            files[4]="weeb_3_bg.wasm.d.ts" \
            sideEffects[0]="./snippets/*" \
            keywords[0]="bee" \
            keywords[1]="browser" \
            keywords[2]="swarm" \
            keywords[3]="wasm" \
            keywords[4]="webassembly" \
            'exports[.].types=./weeb_3.d.ts' \
            'exports[.].import=./weeb_3.js' \
            'exports[.].default=./weeb_3.js'
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            BASE_VERSION="$(node -p "require('./package.json').version.split('-')[0]")"
            RELEASE_VERSION="$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); const run = Number(process.argv[2]); const attempt = Number(process.argv[3]); console.log([major, minor, patch + run * 1000 + attempt].join('.'))" "$BASE_VERSION" "$GITHUB_RUN_NUMBER" "$GITHUB_RUN_ATTEMPT")"
            npm version "$RELEASE_VERSION" --no-git-tag-version
          fi
      - name: Check npm pack contents
        run: npm pack --dry-run ./static
      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            static/LICENSE
            static/README.md
            static/package.json
            static/snippets/web3-0742d85b024bb6f5/inline0.js
            static/weeb_3.d.ts
            static/weeb_3.js
            static/weeb_3_bg.wasm
            static/weeb_3_bg.wasm.d.ts

  publish-npm:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: static
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ./static --access public
