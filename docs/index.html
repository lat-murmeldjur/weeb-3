        <script src="https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.23.3/dist/index.umd.js"></script>
        <script>
        (() => {
          const SEPOLIA = 11155111;
          const SEPOLIA_HEX = "0xaa36a7";

          const RELAYS = [
            "wss://relay.walletconnect.com",
            "wss://relay.walletconnect.org",
          ];

          const RPC_MAP = {
            [SEPOLIA]: "https://rpc.sepolia.org",
          };

          function getState() {
            if (!window.__weeb3_wc_state) {
              window.__weeb3_wc_state = {
                provider: null,
                relayIdx: 0,
                connectInFlight: false,
                openedWalletThisAttempt: false,
                wcUri: null,
                lastAccounts: [],
                lastChainId: null,
              };
            }
            return window.__weeb3_wc_state;
          }

          function normalizeChainIdToHex(chainId) {
            if (typeof chainId === "number") return "0x" + chainId.toString(16);
            const s = String(chainId || "").trim().toLowerCase();
            if (s.startsWith("0x")) return s;
            if (/^\d+$/.test(s)) return "0x" + Number(s).toString(16);
            return s;
          }

          function isRelayishError(e) {
            const msg = String((e && (e.message ?? e)) ?? "");
            return (
              msg.includes("relay") ||
              msg.includes("socket connection") ||
              msg.includes("ERR_NAME_NOT_RESOLVED") ||
              msg.includes("Couldn't establish socket") ||
              msg.includes("Failed to fetch")
            );
          }

          function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
          }

          async function waitFor(fn, {
            timeoutMs = 90000,
            intervalMs = 400,
            label = "condition",
          } = {}) {
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
              try {
                if (await fn()) return true;
              } catch (_) {}
              await sleep(intervalMs);
            }
            throw new Error(`Timed out waiting for ${label} (${Math.round(timeoutMs / 1000)}s)`);
          }

          function openMetaMaskForUri(uri) {
            const enc = encodeURIComponent(uri);
            const nativeLink = `metamask://wc?uri=${enc}`;
            const universalLink = `https://metamask.app.link/wc?uri=${enc}`;

            location.href = nativeLink;
            setTimeout(() => {
              location.href = universalLink;
            }, 700);
          }

          async function teardownProvider() {
            const s = getState();
            try {
              await s.provider?.disconnect?.();
            } catch (_) {}

            s.provider = null;
            s.connectInFlight = false;
            s.openedWalletThisAttempt = false;
            s.wcUri = null;
            s.lastAccounts = [];
            s.lastChainId = null;
          }

          async function ensureProvider(projectId) {
            const s = getState();
            if (s.provider) return s.provider;

            const WC = window["@walletconnect/ethereum-provider"];
            if (!WC?.EthereumProvider) {
              throw new Error("WalletConnect EthereumProvider not loaded");
            }

            const provider = await WC.EthereumProvider.init({
              projectId,
              relayUrl: RELAYS[s.relayIdx],
              chains: [SEPOLIA],
              optionalChains: [SEPOLIA],
              showQrModal: false,
              metadata: {
                name: "weeb-3",
                description: "Swarm uploader",
                url: location.origin,
                icons: [location.origin + "/icon.png"],
              },
              rpcMap: RPC_MAP,
            });

            provider.on("display_uri", (uri) => {
              s.wcUri = uri;

              if (!s.connectInFlight) return;
              if (s.openedWalletThisAttempt) return;

              s.openedWalletThisAttempt = true;
              openMetaMaskForUri(uri);
            });

            provider.on("accountsChanged", (accounts) => {
              s.lastAccounts = Array.isArray(accounts) ? accounts : [];
              console.log("WC accountsChanged:", s.lastAccounts);
            });

            provider.on("chainChanged", (chainId) => {
              s.lastChainId = normalizeChainIdToHex(chainId);
              console.log("WC chainChanged:", s.lastChainId);
            });

            provider.on("connect", (info) => {
              console.log("WC connect:", info);
            });

            provider.on("disconnect", () => {
              console.log("WC disconnect");
              s.wcUri = null;
              s.connectInFlight = false;
              s.openedWalletThisAttempt = false;
              s.lastAccounts = [];
              s.lastChainId = null;
            });

            s.provider = provider;
            return provider;
          }

          async function connectWithRelayFallback(projectId) {
            const s = getState();
            let provider = await ensureProvider(projectId);

            // Avoid stale session/account state.
            if (provider.session) {
              try {
                await provider.disconnect();
              } catch (_) {}
              s.wcUri = null;
              s.lastAccounts = [];
              s.lastChainId = null;
            }

            s.connectInFlight = true;
            s.openedWalletThisAttempt = false;

            try {
              await provider.connect(); 
              return provider;
            } catch (e) {
              if (!isRelayishError(e)) throw e;

              console.warn("Primary relay failed, retrying with fallback relay", e);
              await teardownProvider();
              s.relayIdx = (s.relayIdx + 1) % RELAYS.length;

              provider = await ensureProvider(projectId);
              s.connectInFlight = true;
              s.openedWalletThisAttempt = false;

              await provider.connect(); 
              return provider;
            } finally {
              s.connectInFlight = false;
            }
          }

          async function getAuthorizedAccounts(provider) {
            const s = getState();

            try {
              const accounts = await provider.request({ method: "eth_requestAccounts" });
              if (Array.isArray(accounts) && accounts.length > 0) {
                s.lastAccounts = accounts;
                return accounts;
              }
            } catch (e) {
              console.warn("eth_requestAccounts failed:", e);
            }

            // Fallback: wait until eth_accounts starts returning something.
            await waitFor(async () => {
              const accounts = await provider.request({ method: "eth_accounts" }).catch(() => []);
              if (Array.isArray(accounts) && accounts.length > 0) {
                s.lastAccounts = accounts;
                return true;
              }
              return Array.isArray(s.lastAccounts) && s.lastAccounts.length > 0;
            }, { label: "authorized account" });

            return s.lastAccounts;
          }

          async function ensureSepolia(provider) {
            let chainId = normalizeChainIdToHex(
              await provider.request({ method: "eth_chainId" })
            );

            if (chainId === SEPOLIA_HEX) return chainId;

            try {
              await provider.request({
                method: "wallet_switchEthereumChain",
                params: [{ chainId: SEPOLIA_HEX }],
              });
            } catch (e) {
              const code = e && (e.code ?? e?.data?.originalError?.code);

              if (code === 4902) {
                await provider.request({
                  method: "wallet_addEthereumChain",
                  params: [{
                    chainId: SEPOLIA_HEX,
                    chainName: "Sepolia",
                    nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
                    rpcUrls: ["https://rpc.sepolia.org"],
                    blockExplorerUrls: ["https://sepolia.etherscan.io"],
                  }],
                });

                await provider.request({
                  method: "wallet_switchEthereumChain",
                  params: [{ chainId: SEPOLIA_HEX }],
                });
              } else {
                throw e;
              }
            }

            await waitFor(async () => {
              const now = normalizeChainIdToHex(
                await provider.request({ method: "eth_chainId" })
              );
              return now === SEPOLIA_HEX;
            }, { label: "Sepolia network switch" });

            return SEPOLIA_HEX;
          }

          window.weeb3EnsureEip1193 = async function(projectId) {
            try {
              const s = getState();

              // Real injected provider (desktop extension / MetaMask in-app browser).
              // Do not take this branch if we already created our own WC provider.
              if (window.ethereum?.request && !s.provider) {
                const accounts = await window.ethereum.request({
                  method: "eth_requestAccounts",
                });
                const chainId = await window.ethereum.request({
                  method: "eth_chainId",
                });

                return { ok: true, accounts, chainId };
              }

              const provider = await connectWithRelayFallback(projectId);

              // Expose WC provider as EIP-1193 provider for rust-web3.
              window.ethereum = provider;

              const accounts = await getAuthorizedAccounts(provider);
              if (!Array.isArray(accounts) || accounts.length === 0) {
                throw new Error(
                  "Connected, but no wallet account was authorized. Approve the account connection in MetaMask and try again."
                );
              }

              const chainId = await ensureSepolia(provider);

              // Set again after connect/switch just to be explicit.
              window.ethereum = provider;

              return {
                ok: true,
                accounts,
                chainId,
              };
            } catch (e) {
              return {
                ok: false,
                error: String(e?.message || e),
              };
            }
          };
        })();
        </script>
        <script type="module" defer>
            async function requestPersistentStorage() {
                if (navigator.storage && navigator.storage.persist) {
                    const isPersisted = await navigator.storage.persist();
                    console.log(`Persistent storage granted: ${isPersisted}`);
                    return isPersisted;
                } else {
                    console.warn("StorageManager API or persist() not supported.");
                    return false;
                }
            }
        
            requestPersistentStorage();

            import init, { interweeb } from "./weeb_3.js"
            await init();
            interweeb(""); 
        </script>
