<html>
    <head>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            rel="icon"
            href="https://docs.libp2p.io/logos/libp2p_color_symbol.svg"
            sizes="any"

        <style id="weeb3InterfaceStyle">
            * {
                box-sizing: border-box;
                font-weight: normal;
            }
            html, body {
                max-width: 100%;
                overflow-x: hidden;
            }
            body {
                margin: 0;
                --frame: max(4.8vw, 6.2vh);
                background: #fff;
                color: #000;
                color-scheme: light;
            }
            body.dark {
                background: #000;
                color: #FFFFFF;
                color-scheme: dark;
            }
            body.dark * { color: #FFFFFF; }
            body.light {
                background: #fff;
                color: #000;
            }
            @media (prefers-color-scheme: dark) {
                body:not(.light) {
                    background: #000;
                    color: #FFFFFF;
                    color-scheme: dark;
                }
                body:not(.light) * { color: #FFFFFF; }
            }
            body.dark select option { background: #000; color: #FFFFFF; }
            @media (prefers-color-scheme: dark) {
                body:not(.light) select option { background: #000; color: #FFFFFF; }
            }
            #wrapper {
                max-width: 100vw;
                overflow-x: hidden;
                padding: var(--frame);
            }
            #head {
                display: flex;
                align-items: flex-start;
                gap: 1ch;
                max-width: 100%;
                min-width: 0;
            }
            #headRows { min-width: 0; flex: 1 1 auto; }
            #headRows h3 { margin: 0; }
            #headActions {
                flex: 0 0 auto;
                margin-left: auto;
            }
            #sectionButtons { display: flex; flex-wrap: wrap; column-gap: 1ch; }
            #sectionButtons button, #logsToggle, #themeToggle {
                all: unset;
                cursor: pointer;
            }
            #themeToggle { white-space: nowrap; }
            #jpBrand {
                margin: 0;
                letter-spacing: .1em;
                padding-top: .1em;
                writing-mode: vertical-rl;
                text-orientation: upright;
                font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            }
            input, select, textarea, button, iframe, embed {
                max-width: 100%;
            }
            section, #resultField, #progressField, #progressActions, #logsField {
                max-width: 100%;
                overflow-wrap: anywhere;
            }
            #logsPanel {
                max-width: 50%;
                width: 50%;
            }
            pre, #progressRows {
                margin: 0;
                max-width: 100%;
                overflow-wrap: anywhere;
                white-space: pre-wrap;
            }
            #progressRows:empty, #progressActions:empty { display: none; }
            @media (max-width: 720px) {
                body {
                    --frame: max(2.4vw, 3.1vh);
                    font-size: 12.8px;
                }
                input, select, textarea, button { font-size: 1em; }
                #headRows > h3:first-child > span { display: block; }
                #sectionButtons {
                    align-items: flex-start;
                    display: flex;
                    flex-direction: column;
                    row-gap: .25em;
                }
                #sectionButtons button { display: block; }
                #logsPanel {
                    max-width: 100%;
                    width: 100%;
                }
            }
        </style>

        <script>
        (() => {
            const NETWORKS = {
                11155111: {
                    chainName: "Sepolia",
                    rpcUrls: ["https://rpc.sepolia.org"],
                    nativeCurrency: { name: "Sepolia Ether", symbol: "ETH", decimals: 18 },
                    blockExplorerUrls: ["https://sepolia.etherscan.io"],
                },
                100: {
                    chainName: "Gnosis",
                    rpcUrls: ["https://rpc.gnosischain.com"],
                    nativeCurrency: { name: "xDAI", symbol: "xDAI", decimals: 18 },
                    blockExplorerUrls: ["https://gnosisscan.io"],
                },
            };
            const WALLETCONNECT_SRC = "https://cdn.jsdelivr.net/npm/@walletconnect/ethereum-provider@2.23.3/dist/index.umd.js";
            let walletConnectScriptPromise = null;
            const WC_DEBUG = false;
            const wcDebug = (...args) => {
                if (WC_DEBUG) console.log(...args);
            };

            const RELAYS = [
                "wss://relay.walletconnect.com",
                "wss://relay.walletconnect.org",
            ];

            function getState() {
                if (!window.__weeb3_wc_state) {
                    window.__weeb3_wc_state = {
                        provider: null,
                        relayIdx: 0,
                        connectInFlight: false,
                        openedWalletThisAttempt: false,
                        wcUri: null,
                        lastAccounts: [],
                        lastChainId: null,
                        targetChainId: null,
                    };
                }
                return window.__weeb3_wc_state;
            }

            function normalizeChainIdToHex(chainId) {
                if (typeof chainId === "number") return ("0x" + chainId.toString(16)).toLowerCase();
                const s = String(chainId ?? "").trim().toLowerCase();
                if (s.startsWith("0x")) return s;
                if (/^\d+$/.test(s)) return ("0x" + Number(s).toString(16)).toLowerCase();
                return s;
            }

            function targetWalletChainId(explicitChainId) {
                const numeric = Number(explicitChainId);
                if (Number.isInteger(numeric) && NETWORKS[numeric]) return numeric;

                const swarmNetworkId = Number(document.getElementById("networkIDSettings")?.value || 10);
                return swarmNetworkId === 1 ? 100 : 11155111;
            }

            function chainIdHex(chainId) {
                return ("0x" + Number(chainId).toString(16)).toLowerCase();
            }

            function sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function ensureWalletConnectScript() {
                if (window["@walletconnect/ethereum-provider"]?.EthereumProvider) {
                    return Promise.resolve();
                }

                if (!walletConnectScriptPromise) {
                    walletConnectScriptPromise = new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = WALLETCONNECT_SRC;
                        script.async = true;
                        script.onload = resolve;
                        script.onerror = () => {
                            walletConnectScriptPromise = null;
                            reject(new Error("WalletConnect EthereumProvider failed to load"));
                        };
                        document.head.appendChild(script);
                    });
                }

                return walletConnectScriptPromise;
            }

            async function waitFor(fn, {
                timeoutMs = 90000,
                intervalMs = 400,
                label = "condition",
            } = {}) {
                const started = Date.now();
                while (Date.now() - started < timeoutMs) {
                    try {
                        if (await fn()) return true;
                    } catch (_) {}
                    await sleep(intervalMs);
                }
                throw new Error(`Timed out waiting for ${label} (${Math.round(timeoutMs / 1000)}s).`);
            }

            function isRelayishError(e) {
                const msg = String((e && (e.message ?? e)) ?? "");
                return (
                    msg.includes("relay") ||
                    msg.includes("socket connection") ||
                    msg.includes("ERR_NAME_NOT_RESOLVED") ||
                    msg.includes("Couldn't establish socket") ||
                    msg.includes("Failed to fetch")
                );
            }

            function openMetaMaskForUri(uri) {
                const enc = encodeURIComponent(uri);
                const nativeLink = `metamask://wc?uri=${enc}`;
                const universalLink = `https://metamask.app.link/wc?uri=${enc}`;

                location.href = nativeLink;
                setTimeout(() => {
                    location.href = universalLink;
                }, 700);
            }

            async function teardownProvider() {
                const s = getState();
                try { await s.provider?.disconnect?.(); } catch (_) {}

                s.provider = null;
                s.wcUri = null;
                s.connectInFlight = false;
                s.openedWalletThisAttempt = false;
                s.lastAccounts = [];
                s.lastChainId = null;
                s.targetChainId = null;
            }

            async function ensureProvider(projectId, targetChainId) {
                const s = getState();
                if (s.provider && s.targetChainId === targetChainId) return s.provider;
                if (s.provider && s.targetChainId !== targetChainId) {
                    await teardownProvider();
                }

                await ensureWalletConnectScript();

                const WC = window["@walletconnect/ethereum-provider"];
                if (!WC?.EthereumProvider) {
                    throw new Error("WalletConnect EthereumProvider not loaded");
                }

                const network = NETWORKS[targetChainId] || NETWORKS[11155111];
                const provider = await WC.EthereumProvider.init({
                    projectId,
                    relayUrl: RELAYS[s.relayIdx],
                    chains: [targetChainId],
                    optionalChains: [targetChainId],
                    showQrModal: false,
                    metadata: {
                        name: "weeb-3",
                        description: "Swarm uploader",
                        url: location.origin,
                        icons: [location.origin + "/icon.png"],
                    },
                    rpcMap: {
                        [targetChainId]: network.rpcUrls[0],
                    },
                });

                provider.on("display_uri", (uri) => {
                    s.wcUri = uri;
                    wcDebug("WC display_uri ready");

                    if (!s.connectInFlight) return;
                    if (s.openedWalletThisAttempt) return;

                    s.openedWalletThisAttempt = true;
                    openMetaMaskForUri(uri);
                });

                provider.on("connect", (info) => {
                    wcDebug("WC connected:", info);
                });

                provider.on("disconnect", (info) => {
                    wcDebug("WC disconnected:", info);
                    s.wcUri = null;
                    s.connectInFlight = false;
                    s.openedWalletThisAttempt = false;
                    s.lastAccounts = [];
                    s.lastChainId = null;
                });

                provider.on("accountsChanged", (accounts) => {
                    s.lastAccounts = Array.isArray(accounts) ? accounts : [];
                    wcDebug("WC accountsChanged:", s.lastAccounts);
                });

                provider.on("chainChanged", (chainId) => {
                    s.lastChainId = normalizeChainIdToHex(chainId);
                    wcDebug("WC chainChanged:", s.lastChainId);
                });

                s.provider = provider;
                s.targetChainId = targetChainId;
                return provider;
            }

            async function connectWithRelayFallback(projectId, targetChainId) {
                const s = getState();
                let provider = await ensureProvider(projectId, targetChainId);

                if (provider.session) {
                    wcDebug("Reusing existing WalletConnect session");
                    return provider;
                }

                s.connectInFlight = true;
                s.openedWalletThisAttempt = false;

                try {
                    await provider.connect();
                    return provider;
                } catch (e) {
                    if (!isRelayishError(e)) throw e;

                    console.warn("Primary WC relay failed, trying fallback", e);

                    await teardownProvider();
                    s.relayIdx = (s.relayIdx + 1) % RELAYS.length;

                    provider = await ensureProvider(projectId, targetChainId);
                    s.connectInFlight = true;
                    s.openedWalletThisAttempt = false;

                    await provider.connect();
                    return provider;
                } finally {
                    s.connectInFlight = false;
                }
            }

            async function getAccountsWithoutExtraPrompt(provider) {
                const s = getState();

                if (Array.isArray(s.lastAccounts) && s.lastAccounts.length > 0) {
                    return s.lastAccounts;
                }

                try {
                    const direct = await provider.request({ method: "eth_accounts" });
                    if (Array.isArray(direct) && direct.length > 0) {
                        s.lastAccounts = direct;
                        return direct;
                    }
                } catch (_) {}

                try {
                    await waitFor(async () => {
                        if (Array.isArray(s.lastAccounts) && s.lastAccounts.length > 0) return true;

                        const accounts = await provider.request({ method: "eth_accounts" }).catch(() => []);
                        if (Array.isArray(accounts) && accounts.length > 0) {
                            s.lastAccounts = accounts;
                            return true;
                        }
                        return false;
                    }, {
                        timeoutMs: 15000,
                        intervalMs: 500,
                        label: "authorized account after connect",
                    });
                } catch (_) {}

                if (Array.isArray(s.lastAccounts) && s.lastAccounts.length > 0) {
                    return s.lastAccounts;
                }

                try {
                    const req = await provider.request({ method: "eth_requestAccounts" });
                    if (Array.isArray(req) && req.length > 0) {
                        s.lastAccounts = req;
                        return req;
                    }
                } catch (e) {
                    console.warn("eth_requestAccounts failed:", e);
                }

                return Array.isArray(s.lastAccounts) ? s.lastAccounts : [];
            }

            async function ensureInjectedChain(provider, targetChainId) {
                const expected = chainIdHex(targetChainId);
                let current = normalizeChainIdToHex(
                    await provider.request({ method: "eth_chainId" })
                );

                if (current === expected) return current;

                try {
                    await provider.request({
                        method: "wallet_switchEthereumChain",
                        params: [{ chainId: expected }],
                    });
                } catch (e) {
                    const network = NETWORKS[targetChainId];
                    if (network && (e?.code === 4902 || String(e?.message || e).includes("4902"))) {
                        await provider.request({
                            method: "wallet_addEthereumChain",
                            params: [{
                                chainId: expected,
                                chainName: network.chainName,
                                nativeCurrency: network.nativeCurrency,
                                rpcUrls: network.rpcUrls,
                                blockExplorerUrls: network.blockExplorerUrls,
                            }],
                        });
                    } else {
                        console.warn("wallet_switchEthereumChain failed:", e);
                    }
                }

                return normalizeChainIdToHex(
                    await provider.request({ method: "eth_chainId" })
                );
            }

            window.weeb3EnsureEip1193 = async function(projectId, requestedChainId) {
                try {
                    const s = getState();
                    const targetChainId = targetWalletChainId(requestedChainId);

                    if (window.ethereum?.request && !s.provider) {
                        const accounts = await window.ethereum.request({
                            method: "eth_requestAccounts",
                        });

                        const chainId = await ensureInjectedChain(window.ethereum, targetChainId);

                        return {
                            ok: true,
                            accounts,
                            chainId,
                            via: "injected",
                        };
                    }

                    const provider = await connectWithRelayFallback(projectId, targetChainId);

                    window.ethereum = provider;

                    const accounts = await getAccountsWithoutExtraPrompt(provider);
                    if (!Array.isArray(accounts) || accounts.length === 0) {
                        throw new Error(
                            "Connected, but no authorized account is available. Open MetaMask, confirm the site connection, return to Chrome, and tap again."
                        );
                    }

                    const chainId = normalizeChainIdToHex(
                        await provider.request({ method: "eth_chainId" })
                    );

                    window.ethereum = provider;

                    return {
                        ok: true,
                        accounts,
                        chainId,
                        via: "walletconnect",
                    };
                } catch (e) {
                    return {
                        ok: false,
                        error: String(e?.message || e),
                    };
                }
            };
        })();
        </script>
        <script type="module" defer>
            async function requestPersistentStorage() {
                if (navigator.storage && navigator.storage.persist) {
                    const isPersisted = await navigator.storage.persist();
                    return isPersisted;
                } else {
                    console.warn("StorageManager API or persist() not supported.");
                    return false;
                }
            }

            function bootReport(message, error) {
                const text = error ? `${message}: ${error?.stack || error?.message || error}` : message;
                if (error) {
                    console.error(text);
                } else {
                    console.log(text);
                }

            }

            window.addEventListener("error", event => {
                bootReport("weeb-3 boot error", event.error || event.message);
            });
            window.addEventListener("unhandledrejection", event => {
                bootReport("weeb-3 boot rejection", event.reason);
            });

            function withTimeout(promise, label, ms) {
                return Promise.race([
                    promise,
                    new Promise((_, reject) => {
                        setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms);
                    }),
                ]);
            }

            bootReport("weeb-3 page script loaded");
            requestPersistentStorage().catch(error => {
                bootReport("weeb-3 storage persistence failed", error);
            });

            (async () => {
                try {
                    bootReport("weeb-3 module loading");
                    const { default: init, interweeb } = await import("/weeb-3/weeb_3.js");
                    bootReport("weeb-3 wasm init");
                    await withTimeout(init(), "weeb-3 wasm init", 30000);
                    bootReport("weeb-3 interface start");
                    Promise.resolve(interweeb("")).catch(error => {
                        bootReport("weeb-3 interface failed", error);
                    });
                } catch (error) {
                    bootReport("weeb-3 boot failed", error);
                }
            })();
        </script>
