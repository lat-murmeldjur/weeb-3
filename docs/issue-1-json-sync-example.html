<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>weeb-3 issue #1 JSON sync</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 56rem;
      }
      section {
        border-top: 1px solid #999;
        margin-top: 1.25rem;
        padding-top: 1rem;
      }
      button, input {
        font: inherit;
        margin: .25rem .5rem .25rem 0;
      }
      input {
        width: min(100%, 34rem);
      }
      pre {
        background: #111;
        color: #eee;
        overflow: auto;
        padding: .75rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>weeb-3 issue #1 JSON sync</h1>

    <section>
      <h2>1. Diagnostics</h2>
      <button id="diagnostics">Refresh diagnostics</button>
      <pre id="diagnosticsOut"></pre>
    </section>

    <section>
      <h2>2. Batch</h2>
      <button id="checkBatch">Check batch</button>
      <button id="buyBatch">Buy batch and verify</button>
      <pre id="batchOut"></pre>
    </section>

    <section>
      <h2>3. Upload JSON</h2>
      <button id="uploadJson">Upload encrypted JSON</button>
      <pre id="uploadOut"></pre>
    </section>

    <section>
      <h2>4. Download JSON</h2>
      <label>
        Owner address
        <input id="owner" type="text" placeholder="0x..." />
      </label>
      <button id="downloadJson">Download JSON from Swarm</button>
      <pre id="downloadOut"></pre>
    </section>

    <section>
      <h2>5. Upload / retrieve logs</h2>
      <pre id="progressOut"></pre>
      <pre id="logOut"></pre>
    </section>

    <span id="exampleReady" hidden>ready</span>

    <script type="module">
      import init, { Weeb3No103 } from "./weeb_3.js?v=issue1-v5-reapply-clean";

      await init(new URL("./weeb_3_bg.wasm?v=issue1-v5-reapply-clean", import.meta.url));

      const DEFAULT_TOPIC = "oneplusone-app:links:issue-1:v5-reapply-clean";
      const TOPIC = new URLSearchParams(location.search).get("topic")?.trim() || DEFAULT_TOPIC;
      const DEPTH = 17;
      const VALIDITY_DAYS = 365;
      const ENCRYPTION = true;
      const encoder = new TextEncoder();
      const decoder = new TextDecoder();
      const node = new Weeb3No103();
      let lastUpload = null;
      let progressRevision = 0;
      const logLines = [];

      node.start();

      const $ = (id) => document.getElementById(id);

      function show(id, value) {
        $(id).textContent = typeof value === "string" ? value : JSON.stringify(value, jsonReplacer, 2);
      }

      function jsonReplacer(_key, value) {
        if (value instanceof Uint8Array) {
          return { type: "Uint8Array", bytes: value.byteLength };
        }
        return value;
      }

      function bytesFromText(text) {
        return encoder.encode(text);
      }

      function textFromBytes(bytes) {
        return decoder.decode(bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes));
      }

      function bytesToHex(bytes) {
        return Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      function randomHex(byteLength) {
        const bytes = new Uint8Array(byteLength);
        crypto.getRandomValues(bytes);
        return bytesToHex(bytes);
      }

      async function sha256Hex(text) {
        const digest = await crypto.subtle.digest("SHA-256", bytesFromText(text));
        return bytesToHex(new Uint8Array(digest));
      }

      function okStatus(result) {
        return result && (result.status === "ok" || result.status === "already_ready");
      }

      function openVaultFromClick() {
        if (typeof node.openSecureVault === "function") {
          node.openSecureVault();
        }
      }

      function uploadRetrieveLog(line) {
        return /(upload|push|retrieve|retrieval|feed|chunk|disconnect|accounting|cheque|refresh|failed|error)/i.test(line)
          && !/(Dial status|Connected to bootnode|Connected to peer|Observed address)/i.test(line);
      }

      async function refreshRuntimeLogs() {
        try {
          const newLines = [];
          for (const line of Array.from(await node.logs())) {
            if (uploadRetrieveLog(line)) {
              newLines.push(line);
            }
          }
          logLines.unshift(...newLines.reverse());
          while (logLines.length > 140) logLines.pop();
          $("logOut").textContent = logLines.join("\n");

          const snapshot = await node.progressSnapshot(progressRevision);
          if (snapshot.changed) {
            progressRevision = snapshot.revision;
            show("progressOut", Array.from(snapshot.rows || []).filter((row) => {
              return /(upload|feed|chunk|bytes)/i.test(`${row.kind} ${row.phase} ${row.detail}`);
            }));
          }
        } catch (_error) {
        }
      }

      function makePayload() {
        const syncId = `issue-1-${Date.now()}-${randomHex(16)}`;
        const payload = {
          app: "oneplusone",
          kind: "issue-1-json-sync",
          topic: TOPIC,
          syncId,
          nonce: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
          randomProof: randomHex(32),
          updatedAt: new Date().toISOString(),
          links: [
            {
              peer: "0x1111111111111111111111111111111111111111",
              safe: "0x2222222222222222222222222222222222222222",
              chainId: 100
            }
          ]
        };

        return { syncId, payload, text: JSON.stringify(payload, null, 2) };
      }

      async function diagnostics() {
        const network = await node.networkState();
        const ready = await node.readyState(1, 0);
        return {
          runtime: "node.start() default mainnet",
          network: {
            mode: network.mode,
            networkId: network.networkId,
            walletChainId: network.walletChainId,
            baseSymbol: network.baseSymbol,
            bzzSymbol: network.bzzSymbol
          },
          connections: {
            ready: ready.ready,
            connected: ready.connections,
            connecting: ready.connecting
          },
          feed: {
            topic: TOPIC,
            normalizedTopic: node.feedTopic(TOPIC).feedTopic,
            identity: await node.feedIdentity(TOPIC)
          },
          batchRequest: {
            depth: DEPTH,
            validityDays: VALIDITY_DAYS,
            encryption: ENCRYPTION
          }
        };
      }

      async function checkBatch() {
        return node.uploadPrerequisites(DEPTH, VALIDITY_DAYS);
      }

      async function buyBatchAndVerify() {
        const before = await checkBatch();
        if (before.status === "wrong_network") {
          throw new Error("Wallet is on the wrong chain for the active network.");
        }
        if (before.hasFunds === false) {
          throw new Error("Wallet does not report enough BZZ for this batch.");
        }
        if (before.usableBatch) {
          return { status: "already_ready", before, after: before };
        }

        const purchase = await node.buyBatch(DEPTH, VALIDITY_DAYS);
        if (!okStatus(purchase)) {
          throw new Error(purchase.error || purchase.reason || "buyBatch failed");
        }

        await new Promise((resolve) => setTimeout(resolve, 900));
        const after = await checkBatch();
        return {
          status: after.usableBatch ? "buy_verified" : "buy_unverified",
          before,
          purchase,
          after
        };
      }

      async function uploadJson() {
        await refreshRuntimeLogs();
        const batch = await checkBatch();
        if (!batch.usableBatch) {
          throw new Error("No usable batch yet. Check or buy a batch first.");
        }

        const payload = makePayload();
        const upload = await node.postFeedBytes(
          TOPIC,
          bytesFromText(payload.text),
          "application/json",
          "oneplusone-links.json",
          ENCRYPTION
        );
        if (!okStatus(upload)) {
          throw new Error(upload.error || upload.reason || "feed upload failed");
        }

        const digest = await sha256Hex(payload.text);
        lastUpload = { owner: upload.feedOwner, topic: TOPIC, digest, text: payload.text, payload: payload.payload, syncId: payload.syncId, upload };
        $("owner").value = upload.feedOwner || "";

        return {
          status: "uploaded",
          owner: upload.feedOwner,
          topic: TOPIC,
          syncId: payload.syncId,
          digest,
          encryption: ENCRYPTION,
          bytes: bytesFromText(payload.text).byteLength,
          batch,
          upload,
          json: payload.payload
        };
      }

      async function downloadJson() {
        const owner = $("owner").value.trim() || lastUpload?.owner || "";
        if (!owner) {
          throw new Error("Upload first, or paste an owner address.");
        }

        await refreshRuntimeLogs();
        const result = await node.acquireFeedBytes(owner, TOPIC);
        if (result.status !== "ok") {
          return { status: result.status, reason: result.reason, owner, topic: TOPIC, result };
        }

        const downloadedText = textFromBytes(result.body);
        const downloadedJson = JSON.parse(downloadedText);
        const text = JSON.stringify(downloadedJson, null, 2);
        const digest = await sha256Hex(text);
        const exactTextMatch = lastUpload ? downloadedText === lastUpload.text : null;
        const digestMatches = lastUpload ? digest === lastUpload.digest : null;
        const syncIdMatches = lastUpload ? downloadedJson.syncId === lastUpload.syncId : null;

        return {
          status: "downloaded",
          owner,
          topic: result.feedTopic,
          path: result.path,
          bytes: result.body.byteLength,
          syncId: downloadedJson.syncId,
          uploadedSyncId: lastUpload?.syncId || null,
          digest,
          uploadedDigest: lastUpload?.digest || null,
          matchesLastUpload: digestMatches,
          digestMatches,
          syncIdMatches,
          exactTextMatch,
          json: downloadedJson
        };
      }

      $("diagnostics").onclick = async () => {
        try {
          show("diagnosticsOut", await diagnostics());
        } catch (error) {
          show("diagnosticsOut", { status: "error", error: error.message || String(error) });
        }
      };

      $("checkBatch").onclick = async () => {
        try {
          openVaultFromClick();
          show("batchOut", await checkBatch());
        } catch (error) {
          show("batchOut", { status: "error", error: error.message || String(error) });
        }
      };

      $("buyBatch").onclick = async () => {
        try {
          openVaultFromClick();
          show("batchOut", await buyBatchAndVerify());
        } catch (error) {
          show("batchOut", { status: "error", error: error.message || String(error) });
        }
      };

      $("uploadJson").onclick = async () => {
        try {
          openVaultFromClick();
          show("uploadOut", await uploadJson());
        } catch (error) {
          show("uploadOut", { status: "error", error: error.message || String(error) });
        }
      };

      $("downloadJson").onclick = async () => {
        try {
          show("downloadOut", await downloadJson());
        } catch (error) {
          show("downloadOut", { status: "error", error: error.message || String(error) });
        }
      };

      setInterval(refreshRuntimeLogs, 600);
      await new Promise((resolve) => setTimeout(resolve, 120));
      show("diagnosticsOut", await diagnostics());
      await refreshRuntimeLogs();
      $("exampleReady").hidden = false;
    </script>
  </body>
</html>
